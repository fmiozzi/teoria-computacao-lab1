# Autômato NFAε — Exemplo simples (3 estados, alfabeto {0, 1})
#
# Linguagem reconhecida:
#   Cadeias sobre {0,1} que contêm "01" como subcadeia,
#   com possibilidade de começar diretamente em q1 via epsilon.
#
# Demonstra: transições epsilon e não-determinismo básico.

type: nfae
alphabet: ["0", "1"]
states: ["q0", "q1", "q2"]
initial_state: "q0"
final_states: ["q2"]
transitions:
  - from: "q0"
    symbol: "0"
    to: ["q0", "q1"]
  - from: "q0"
    symbol: "epsilon"
    to: ["q1"]
  - from: "q1"
    symbol: "1"
    to: ["q2"]
