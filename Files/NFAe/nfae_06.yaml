# Linguagem: (a|b)* - qualquer cadeia (inclusive vazia) sobre {a,b}.
type: nfae
alphabet: [a, b]
states: [q0, q1, q2, q3, q4, q5, q6, q7]
initial_state: q0
final_states: [q7]
transitions:
  - from: q0
    symbol: epsilon
    to: [q1, q7]
  - from: q1
    symbol: epsilon
    to: [q2, q4]
  - from: q2
    symbol: a
    to: [q3]
  - from: q3
    symbol: epsilon
    to: [q6]
  - from: q4
    symbol: b
    to: [q5]
  - from: q5
    symbol: epsilon
    to: [q6]
  - from: q6
    symbol: epsilon
    to: [q1, q7]
