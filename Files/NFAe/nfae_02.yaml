# Linguagem: {a, b} - aceita exatamente uma letra, a ou b.
type: nfae
alphabet: [a, b]
states: [q0, q1, q2, q3, q4]
initial_state: q0
final_states: [q4]
transitions:
  - from: q0
    symbol: epsilon
    to: [q1, q2]
  - from: q1
    symbol: a
    to: [q3]
  - from: q2
    symbol: b
    to: [q3]
  - from: q3
    symbol: epsilon
    to: [q4]
